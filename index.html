<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>ClipCut - Professional Video Suite | Free Video Editor</title>
    <meta name="title" content="ClipCut - Professional Video Suite | Free Video Editor" />
    <meta name="description" content="ClipCut is a free, open-source video editor for content creators. Edit videos, add text overlays, transitions, and export in HD. Available for Linux, Windows, and Web." />
    <meta name="keywords" content="video editor, free video editor, open source video editor, video editing software, clipcut, capcut alternative, video maker, content creator tools" />
    <meta name="author" content="ClipCut Team" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#75AADB" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clipcut.app/" />
    <meta property="og:title" content="ClipCut - Professional Video Suite | Free Video Editor" />
    <meta property="og:description" content="ClipCut is a free, open-source video editor for content creators. Edit videos, add text overlays, transitions, and export in HD. Available for Linux, Windows, and Web." />
    <meta property="og:image" content="https://clipcut.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ClipCut" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://clipcut.app/" />
    <meta name="twitter:title" content="ClipCut - Professional Video Suite | Free Video Editor" />
    <meta name="twitter:description" content="ClipCut is a free, open-source video editor for content creators. Edit videos, add text overlays, transitions, and export in HD." />
    <meta name="twitter:image" content="https://clipcut.app/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'wasm-unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      media-src 'self' blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com;
      worker-src 'self' blob:;
      child-src 'self' blob:;
      frame-ancestors 'none';
      form-action 'self';
      base-uri 'self';
      upgrade-insecure-requests;
    " />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
