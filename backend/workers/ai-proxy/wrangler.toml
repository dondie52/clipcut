name = "clipcut-ai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[ai]
binding = "AI"

# Per-IP rate limiter: 60 requests per 60 seconds.
# namespace_id is a numeric label (1-65535) scoped to this worker — no CLI provisioning needed.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
